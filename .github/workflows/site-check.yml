name: Site Check

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate static site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run data checks
        run: node scripts/check-data.mjs

      - name: Run site checks
        shell: pwsh
        run: ./scripts/check-site.ps1
