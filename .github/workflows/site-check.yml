name: Site Check

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate static site
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check JavaScript syntax
        run: |
          node --check assets/js/site.js
          node --check scripts/check-data.mjs
          node --check scripts/check-data-html-sync.mjs

      - name: Run data checks
        run: node scripts/check-data.mjs

      - name: Run data and HTML sync checks
        run: node scripts/check-data-html-sync.mjs

      - name: Run site checks
        shell: pwsh
        run: ./scripts/check-site.ps1
